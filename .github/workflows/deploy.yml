name: Deploy ao GitHub Pages

on:
  # Publica a cada push na branch principal
  push:
    branches: [main]
  # Permite rodar manualmente pela aba "Actions"
  workflow_dispatch:

# Permissões necessárias para o deploy do Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy por vez (cancela execuções antigas em andamento)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build (export estático)
        # Repositório de projeto → o site fica em /Realcenter
        env:
          BASE_PATH: /Realcenter
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato (pasta out)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
